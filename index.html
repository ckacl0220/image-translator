<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 번역기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&family=Do+Hyeon&family=Gamja+Flower&display=swap');
:root{--bg:#0e0e10;--s1:#17171a;--s2:#202025;--border:#32323e;--accent:#6c63ff;--accent2:#ff6584;--text:#ececf4;--muted:#7a7a90;--green:#4ade80;--yellow:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{height:52px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;}
header h1{font-size:16px;font-weight:600;}header .sub{font-size:12px;color:var(--muted);}
.layout{flex:1;display:flex;overflow:hidden;}
.canvas-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{height:48px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:6px;overflow-x:auto;}
.btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:linear-gradient(135deg,var(--accent),#9b8aff);border-color:transparent;color:#fff;font-weight:600;}
.btn.primary:hover{opacity:.88;}.btn.primary:disabled{opacity:.35;cursor:not-allowed;}
.btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(255,101,132,.1);}
.btn svg{width:13px;height:13px;flex-shrink:0;}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.pill{margin-left:auto;font-size:11px;font-family:monospace;color:var(--muted);background:var(--s2);padding:4px 10px;border-radius:20px;border:1px solid var(--border);flex-shrink:0;}
.pill.ok{color:var(--green);border-color:#4ade8033;}.pill.busy{color:var(--yellow);border-color:#fbbf2433;}.pill.err{color:var(--accent2);border-color:#ff658433;}
.canvas-area{flex:1;display:flex;overflow:hidden;}
.main-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;background:var(--bg);min-height:0;}
/* 원본 미리보기 사이드패널 */
.orig-panel{width:0;flex-shrink:0;background:var(--s1);border-left:1px solid var(--border);overflow:hidden;transition:width .2s;display:flex;flex-direction:column;}
.orig-panel.show{width:220px;}
.orig-panel-head{padding:10px 12px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.orig-panel-body{flex:1;overflow:auto;padding:8px;display:flex;align-items:flex-start;justify-content:center;}
.orig-panel-body canvas{width:100%;height:auto;border-radius:6px;border:1px solid var(--border);}
#drop-zone{width:100%;max-width:700px;min-height:320px;border:2px dashed var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;color:var(--muted);}
#drop-zone:hover,#drop-zone.over{border-color:var(--accent);background:rgba(108,99,255,.05);color:var(--accent);}
#drop-zone .dz-icon{font-size:44px;}#drop-zone p{font-size:14px;}#drop-zone small{font-size:11px;opacity:.6;}
#canvas-wrap{display:none;position:relative;flex-shrink:0;}
#mainCanvas{display:block;border-radius:8px;box-shadow:0 8px 40px #00000099;}
#mainCanvas.erase-cursor{cursor:none;}#mainCanvas.eyedrop-cursor{cursor:crosshair;}
.overlay{position:absolute;top:0;left:0;pointer-events:none;}
/* 텍스트박스 */
.rbox{position:absolute;border:2px solid transparent;border-radius:2px;pointer-events:all;transition:border-color .15s;}
.rbox:hover{border-color:#6c63ff88;}.rbox.sel{border-color:var(--accent);}
.rbox .rlabel{position:absolute;top:-18px;left:-1px;background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;border-radius:3px 3px 0 0;white-space:nowrap;font-family:monospace;pointer-events:none;}
/* 리사이즈 핸들 */
.rbox .rhandle{position:absolute;width:10px;height:10px;background:var(--accent);border:1px solid #fff;border-radius:2px;pointer-events:all;}
.rbox .rhandle.nw{top:-5px;left:-5px;cursor:nw-resize;}
.rbox .rhandle.ne{top:-5px;right:-5px;cursor:ne-resize;}
.rbox .rhandle.sw{bottom:-5px;left:-5px;cursor:sw-resize;}
.rbox .rhandle.se{bottom:-5px;right:-5px;cursor:se-resize;}
.rbox .rhandle.n{top:-5px;left:calc(50% - 5px);cursor:n-resize;}
.rbox .rhandle.s{bottom:-5px;left:calc(50% - 5px);cursor:s-resize;}
.rbox .rhandle.e{right:-5px;top:calc(50% - 5px);cursor:e-resize;}
.rbox .rhandle.w{left:-5px;top:calc(50% - 5px);cursor:w-resize;}
/* 워터마크박스 */
.wmbox{position:absolute;border:2px dashed var(--yellow);pointer-events:all;cursor:move;}
.wmbox .wmhandle{position:absolute;width:10px;height:10px;background:var(--yellow);border:1px solid #fff;border-radius:2px;bottom:-5px;right:-5px;cursor:se-resize;pointer-events:all;}
/* 지우개 커서 */
#eraseCursor{position:absolute;border:2px solid var(--accent2);border-radius:50%;pointer-events:none;display:none;transform:translate(-50%,-50%);z-index:10;}
/* 사이드바 */
.sidebar{width:360px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:12px 4px;font-size:11px;font-family:inherit;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.panel{flex:1;overflow-y:auto;padding:16px;}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.rcard{background:var(--s2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.rcard.sel{border-color:var(--accent);}
.rcard-head{padding:10px 12px;display:flex;align-items:center;gap:8px;}
.rnum{width:20px;height:20px;background:rgba(108,99,255,.18);color:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:monospace;font-weight:700;flex-shrink:0;}
.rprev{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rcard-body{padding:0 12px 12px;display:flex;flex-direction:column;gap:9px;}
.fl{display:flex;flex-direction:column;gap:3px;}
.fl label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-family:inherit;font-size:12px;outline:none;width:100%;}
.fi:focus{border-color:var(--accent);}
textarea.fi{min-height:56px;resize:vertical;font-size:12px;}
/* 커스텀 셀렉트 */
.csel{position:relative;width:100%;}
.csel-val{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 28px 7px 9px;color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;}
.csel-val::after{content:'▾';position:absolute;right:9px;color:var(--muted);font-size:10px;pointer-events:none;}
.csel-val:hover{border-color:var(--accent);}
.csel-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--border);border-radius:8px;z-index:999;display:none;box-shadow:0 8px 24px #00000088;max-height:200px;overflow-y:auto;}
.csel-drop.open{display:block;}
.csel-opt{padding:9px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.csel-opt:hover{background:rgba(108,99,255,.15);color:var(--accent);}
.csel-opt.sel{color:var(--accent);font-weight:600;}
.row2{display:flex;gap:8px;}.row2 .fl{flex:1;}
input[type=color]{width:34px;height:34px;padding:2px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;}
input[type=number].fi{-moz-appearance:textfield;}
input[type=range]{width:100%;accent-color:var(--accent);}
.drag-hint{font-size:10px;color:var(--muted);text-align:center;padding:2px 0;}
.apply-btn{width:100%;padding:9px;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:7px;color:var(--accent);font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s;margin-top:2px;}
.apply-btn:hover{background:rgba(108,99,255,.22);}
/* 텍스트 효과 토글 버튼들 */
.fx-row{display:flex;gap:4px;flex-wrap:wrap;}
.fx-btn{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;transition:all .12s;}
.fx-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.12);}
.fx-btn:hover{border-color:var(--accent);color:var(--accent);}
.gset{display:flex;flex-direction:column;gap:14px;}
.gcard{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:10px;}
.gcard h4{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.font-prev{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;font-size:17px;color:var(--text);min-height:40px;display:flex;align-items:center;justify-content:center;}
.erase-card{background:rgba(255,101,132,.07);border:1px solid rgba(255,101,132,.3);border-radius:10px;padding:12px;display:none;flex-direction:column;gap:10px;margin-bottom:14px;}
.erase-card.show{display:flex;}
.erase-card h4{font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px;}
.wm-card{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:10px;}
.wm-card h4{font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:.5px;}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;}
#loading{display:none;position:fixed;inset:0;background:#00000099;backdrop-filter:blur(4px);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loading.show{display:flex;}
.spin{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ltxt{font-size:14px;color:var(--text);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 18px;font-size:12px;z-index:200;transition:transform .25s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:#4ade8044;color:var(--green);}.toast.ng{border-color:#ff658444;color:var(--accent2);}
.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:12px;}
.empty .ei{font-size:30px;margin-bottom:10px;}
input[type=file]{display:none;}
/* 스포이드 미리보기 */
#eyedropPreview{position:fixed;width:60px;height:60px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 12px #000a;display:none;pointer-events:none;z-index:300;transform:translate(-50%,-120%);}
</style>
</head>
<body>
<header>
  <div class="logo">🌐</div>
  <h1>이미지 번역기</h1>
  <span class="sub">중국어 → 한국어</span>
</header>
<div class="layout">
  <div class="canvas-col">
    <div class="toolbar">
      <button class="btn primary" onclick="document.getElementById('fi').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>이미지 업로드
      </button>
      <input type="file" id="fi" accept="image/*" onchange="loadImg(event)">
      <div class="sep"></div>
      <button class="btn primary" id="trBtn" onclick="doTranslate()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>번역 시작
      </button>
      <button class="btn" id="reBtn" onclick="renderAll()" style="display:none">↺ 다시 렌더</button>
      <button class="btn" id="eraseBtn" onclick="toggleEraseMode()" style="display:none">🧹 지우개</button>
      <button class="btn" id="eyedropBtn" onclick="toggleEyedrop()" style="display:none">💧 스포이드</button>
      <button class="btn" id="origBtn" onclick="toggleOrigPanel()" style="display:none">🖼 원본 보기</button>
      <button class="btn" id="dlBtn" onclick="doExport()" style="display:none">⬇ PNG 내보내기</button>
      <div class="pill" id="pill">대기 중</div>
    </div>
    <div class="canvas-area">
      <div class="main-canvas-wrap" id="cscroll">
        <div id="drop-zone" ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" onclick="document.getElementById('fi').click()">
          <div class="dz-icon">🖼️</div>
          <p>이미지를 드래그하거나 클릭해서 업로드</p>
          <small>PNG · JPG · WEBP 지원</small>
        </div>
        <div id="canvas-wrap">
          <canvas id="mainCanvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="eraseCursor"></div>
        </div>
      </div>
      <!-- 원본 사이드 패널 -->
      <div class="orig-panel" id="origPanel">
        <div class="orig-panel-head">
          <span>원본 이미지</span>
          <span style="cursor:pointer;font-size:14px" onclick="toggleOrigPanel()">✕</span>
        </div>
        <div class="orig-panel-body"><canvas id="origThumb"></canvas></div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="tabs">
      <button class="tab on" id="tabRegions" onclick="switchTab('regions')">텍스트 영역</button>
      <button class="tab" id="tabSettings" onclick="switchTab('settings')">설정</button>
      <button class="tab" id="tabWatermark" onclick="switchTab('watermark')">워터마크</button>
    </div>
    <div class="panel" id="tab-regions">
      <div id="rlist"><div class="empty"><div class="ei">📋</div><p>이미지를 업로드하고<br>번역 시작을 눌러주세요</p></div></div>
    </div>
    <div class="panel" id="tab-settings" style="display:none">
      <div class="gset">
        <div class="erase-card" id="eraseCard">
          <h4>🧹 수동 지우개 모드</h4>
          <div class="fl"><label>브러시 크기</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="range" min="5" max="120" value="20" id="eraseSize" oninput="document.getElementById('eraseSizeN').value=this.value">
              <input type="number" class="fi" id="eraseSizeN" value="20" style="width:56px" oninput="document.getElementById('eraseSize').value=this.value">
            </div>
          </div>
          <div class="fl"><label>채우기 방식</label>
            <select class="fi" id="eraseFill">
              <option value="patch">패치 (자연스러운 복구)</option>
              <option value="auto">자동 (주변색)</option>
              <option value="white">흰색</option>
              <option value="blur">블러</option>
              <option value="eyedrop">스포이드 색상</option>
            </select>
          </div>
          <button class="apply-btn" style="border-color:rgba(255,101,132,.4);color:var(--accent2)" onclick="toggleEraseMode()">✕ 지우개 모드 종료</button>
        </div>
        <div class="gcard">
          <h4>기본 폰트</h4>
          <div class="fl"><label>폰트 선택</label>
            <div class="csel" id="gFontSel">
              <div class="csel-val" onclick="toggleCsel('gFontSel')" id="gFontVal">Noto Sans KR</div>
              <div class="csel-drop" id="gFontDrop"></div>
            </div>
          </div>
          <div class="font-prev" id="fontPrev">미리보기 · 가나다라</div>
        </div>
        <div class="gcard">
          <h4>기본 스타일</h4>
          <div class="fl"><label>폰트 크기</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="range" min="8" max="80" value="18" id="gSize" oninput="document.getElementById('gSizeN').value=this.value">
              <input type="number" class="fi" id="gSizeN" value="18" style="width:56px" oninput="document.getElementById('gSize').value=this.value">
            </div>
          </div>
          <div class="row2">
            <div class="fl"><label>텍스트 색상</label><input type="color" id="gColor" value="#111111"></div>
            <div class="fl" style="flex:1"><label>정렬</label>
              <select class="fi" id="gAlign"><option value="center">가운데</option><option value="left">왼쪽</option><option value="right">오른쪽</option></select>
            </div>
          </div>
          <div class="fl"><label>텍스트 효과</label>
            <div class="fx-row">
              <button class="fx-btn" id="gBoldBtn" onclick="toggleGFx('bold')"><b>B</b></button>
              <button class="fx-btn" id="gItalicBtn" onclick="toggleGFx('italic')"><i>I</i></button>
              <button class="fx-btn" id="gUnderBtn" onclick="toggleGFx('underline')"><u>U</u></button>
              <button class="fx-btn" id="gStrokeBtn" onclick="toggleGFx('stroke')">획</button>
              <button class="fx-btn" id="gShadowBtn" onclick="toggleGFx('shadow')">그림자</button>
            </div>
          </div>
          <div class="fl" id="gStrokeOpts" style="display:none">
            <label>획 색상 / 두께</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="color" id="gStrokeColor" value="#ffffff">
              <input type="range" min="1" max="10" value="2" id="gStrokeW" style="flex:1">
              <span id="gStrokeWN" style="font-size:11px;color:var(--muted);width:20px">2</span>
            </div>
          </div>
          <div class="fl" id="gShadowOpts" style="display:none">
            <label>그림자 색상 / 강도</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="color" id="gShadowColor" value="#000000">
              <input type="range" min="1" max="15" value="4" id="gShadowB" style="flex:1">
              <span id="gShadowBN" style="font-size:11px;color:var(--muted);width:20px">4</span>
            </div>
          </div>
        </div>
        <div class="gcard">
          <h4>배경 처리 방식</h4>
          <select class="fi" id="gBg"><option value="auto">자동 (주변색 채우기)</option><option value="white">흰색으로 채우기</option><option value="blur">블러 처리</option></select>
        </div>
        <button class="btn primary" style="width:100%" onclick="applyGlobal()">전체에 적용 후 렌더링</button>
      </div>
    </div>
    <!-- 워터마크 탭 -->
    <div class="panel" id="tab-watermark" style="display:none">
      <div class="gset">
        <div class="wm-card">
          <h4>🏷 워터마크 설정</h4>
          <button class="btn" style="width:100%" onclick="document.getElementById('wmFile').click()">📎 워터마크 PNG 업로드</button>
          <input type="file" id="wmFile" accept="image/png,image/*" onchange="loadWatermark(event)">
          <div id="wmPreviewWrap" style="display:none">
            <img id="wmPreviewImg" style="max-width:100%;border-radius:6px;border:1px solid var(--border);margin-bottom:8px">
            <div class="fl"><label>가로 크기 (px)</label>
              <input type="number" class="fi" id="wmW" value="200" oninput="updateWmBox()">
            </div>
            <div class="fl"><label>투명도</label>
              <div style="display:flex;gap:8px;align-items:center">
                <input type="range" min="0" max="100" value="80" id="wmOpacity" oninput="document.getElementById('wmOpacityN').value=this.value;updateWmBox()">
                <input type="number" class="fi" id="wmOpacityN" value="80" style="width:56px" oninput="document.getElementById('wmOpacity').value=this.value;updateWmBox()">
              </div>
            </div>
            <div class="fl"><label>위치 (X, Y)</label>
              <div class="row2">
                <input type="number" class="fi" id="wmX" value="20" oninput="updateWmBox()">
                <input type="number" class="fi" id="wmY" value="20" oninput="updateWmBox()">
              </div>
            </div>
            <div class="drag-hint">📦 이미지 위 노란 박스를 드래그해서 이동<br>오른쪽 하단 핸들로 크기 조절</div>
            <button class="apply-btn" onclick="renderAll();toast('워터마크 적용됨','ok')">✓ 워터마크 적용</button>
            <button class="apply-btn" style="border-color:rgba(255,101,132,.3);color:var(--accent2);margin-top:4px" onclick="removeWatermark()">✕ 워터마크 제거</button>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-foot">
      <button class="btn primary" id="dlBtn2" onclick="doExport()" style="display:none;width:100%">📤 PNG 내보내기 (원본 크기)</button>
    </div>
  </div>
</div>
<div id="loading"><div class="spin"></div><div id="ltxt">처리 중...</div></div>
<div class="toast" id="toast"></div>
<div id="eyedropPreview"></div>
<script>
// ===== 폰트 목록 =====
const FONTS=[
  {label:'Noto Sans KR',value:"'Noto Sans KR',sans-serif"},
  {label:'Black Han Sans (굵은 고딕)',value:"'Black Han Sans',sans-serif"},
  {label:'Gowun Dodum (부드러운)',value:"'Gowun Dodum',sans-serif"},
  {label:'Jua (귀여운)',value:"'Jua',sans-serif"},
  {label:'Do Hyeon (둥근 고딕)',value:"'Do Hyeon',sans-serif"},
  {label:'Gamja Flower (손글씨)',value:"'Gamja Flower',cursive"},
];
// gFont 전역값
let gFontVal="'Noto Sans KR',sans-serif";
// 전역 fx 상태
let gFx={bold:false,italic:false,underline:false,stroke:false,shadow:false};

// ===== 상태 =====
let origImg=null,imgW=0,imgH=0,regions=[],selId=null,scale=1,resultCanvas=null;
let eraseMode=false,erasing=false;
let eyedropMode=false,eyedropColor='#ffffff';
let wmImg=null,wmX=20,wmY=20,wmW=200,wmOpacity=0.8;

window.onload=()=>{
  buildFontDropdowns();
  // 슬라이더 실시간 표시
  document.getElementById('gStrokeW').oninput=function(){document.getElementById('gStrokeWN').textContent=this.value;};
  document.getElementById('gShadowB').oninput=function(){document.getElementById('gShadowBN').textContent=this.value;};
  // 외부 클릭시 드롭다운 닫기
  document.addEventListener('click',e=>{
    document.querySelectorAll('.csel-drop.open').forEach(d=>{
      if(!d.closest('.csel').contains(e.target)) d.classList.remove('open');
    });
  });
};

// ===== 커스텀 셀렉트 =====
function buildFontDropdowns(){
  // 전역 폰트 드롭다운
  const drop=document.getElementById('gFontDrop');
  drop.innerHTML=FONTS.map((f,i)=>`<div class="csel-opt${i===0?' sel':''}" data-val="${f.value}" onclick="selectGFont('${f.value}','${f.label}',this)">${f.label}</div>`).join('');
}

function toggleCsel(id){
  const drop=document.getElementById(id.replace('Sel','Drop'));
  const isOpen=drop.classList.contains('open');
  document.querySelectorAll('.csel-drop.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) drop.classList.add('open');
}

function selectGFont(val,label,el){
  gFontVal=val;
  document.getElementById('gFontVal').textContent=label;
  document.querySelectorAll('#gFontDrop .csel-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('gFontDrop').classList.remove('open');
  document.getElementById('fontPrev').style.fontFamily=val;
}

// 영역별 커스텀 폰트 셀렉트
function buildRegionFontSel(r){
  const cur=FONTS.find(f=>f.value===r.font)||FONTS[0];
  return `<div class="csel" id="rfontSel-${r.id}">
    <div class="csel-val" onclick="toggleCsel('rfontSel-${r.id}')" id="rfontVal-${r.id}">${cur.label}</div>
    <div class="csel-drop" id="rfontSel-${r.id}Drop">
      ${FONTS.map(f=>`<div class="csel-opt${f.value===r.font?' sel':''}" data-val="${f.value}" onclick="selectRFont(${r.id},'${f.value}','${f.label}',this)">${f.label}</div>`).join('')}
    </div>
  </div>`;
}

function selectRFont(id,val,label,el){
  const r=regions.find(r=>r.id===id);if(!r)return;
  r.font=val;
  const valEl=document.getElementById(`rfontVal-${id}`);if(valEl)valEl.textContent=label;
  const drop=document.getElementById(`rfontSel-${id}Drop`);
  if(drop){drop.querySelectorAll('.csel-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');drop.classList.remove('open');}
}

// ===== 전역 FX 토글 =====
function toggleGFx(key){
  gFx[key]=!gFx[key];
  document.getElementById('g'+key.charAt(0).toUpperCase()+key.slice(1)+'Btn').classList.toggle('on',gFx[key]);
  if(key==='stroke') document.getElementById('gStrokeOpts').style.display=gFx.stroke?'flex':'none';
  if(key==='shadow') document.getElementById('gShadowOpts').style.display=gFx.shadow?'flex':'none';
}

// ===== 이미지 로드 =====
function onDrop(e){e.preventDefault();dz().classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))readFile(f);}
function onDragOver(e){e.preventDefault();dz().classList.add('over');}
function onDragLeave(){dz().classList.remove('over');}
function loadImg(e){if(e.target.files[0])readFile(e.target.files[0]);}
function dz(){return document.getElementById('drop-zone');}

function readFile(file){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img;imgW=img.width;imgH=img.height;
      regions=[];selId=null;resultCanvas=null;eraseMode=false;wmImg=null;
      dz().style.display='none';
      document.getElementById('canvas-wrap').style.display='block';
      document.getElementById('trBtn').disabled=false;
      ['reBtn','eraseBtn','eyedropBtn','origBtn','dlBtn','dlBtn2'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
      document.getElementById('eraseCard').classList.remove('show');
      setupCanvas();setPill('이미지 로드됨','');toast('업로드 완료!','ok');renderList();
      drawOrigThumb();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

function drawOrigThumb(){
  const thumb=document.getElementById('origThumb');
  thumb.width=imgW;thumb.height=imgH;
  thumb.getContext('2d').drawImage(origImg,0,0);
}

function setupCanvas(){
  const sc=document.getElementById('cscroll');
  scale=Math.min((sc.clientWidth-48)/imgW,(sc.clientHeight-48)/imgH,1);
  const cvs=document.getElementById('mainCanvas');
  cvs.width=Math.round(imgW*scale);cvs.height=Math.round(imgH*scale);
  document.getElementById('overlay').style.cssText=`width:${cvs.width}px;height:${cvs.height}px`;
  cvs.getContext('2d').drawImage(origImg,0,0,cvs.width,cvs.height);
  setupEraseEvents(cvs);
  setupEyedropEvents(cvs);
}

// ===== 번역 =====
async function doTranslate(){
  if(!origImg)return toast('이미지를 먼저 업로드하세요','ng');
  setLoading(true,'이미지 분석 & 번역 중...');setPill('분석 중','busy');
  try{
    const b64=await toB64(origImg,imgW,imgH);
    const raw=await callClaude(b64);
    regions=parseRegions(raw);
    setLoading(true,'렌더링 중...');
    await renderAll();
    ['reBtn','eraseBtn','eyedropBtn','origBtn','dlBtn','dlBtn2'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
    setPill(`${regions.length}개 영역 완료`,'ok');
    toast(`${regions.length}개 번역 완료!`,'ok');
  }catch(err){console.error(err);toast('오류: '+err.message,'ng');setPill('오류','err');}
  finally{setLoading(false);}
}

async function callClaude(b64){
  const res=await fetch('/.netlify/functions/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:b64,imageWidth:imgW,imageHeight:imgH})});
  const raw=await res.text();
  if(!res.ok){let msg=`HTTP ${res.status}`;try{msg=JSON.parse(raw).error||msg;}catch(e){msg=raw.substring(0,200)||msg;}throw new Error(msg);}
  let data;try{data=JSON.parse(raw);}catch(e){throw new Error('응답 파싱 오류: '+raw.substring(0,200));}
  return data.text||'';
}

function parseRegions(text){
  const m=text.match(/\[[\s\S]*\]/);
  if(!m)throw new Error('번역 결과 파싱 실패.');
  const arr=JSON.parse(m[0]);
  const gSize=parseInt(document.getElementById('gSizeN').value);
  const gColor=document.getElementById('gColor').value;
  const gAlign=document.getElementById('gAlign').value;
  return arr.map((r,i)=>({
    id:i,x:r.x||0,y:r.y||0,w:r.w||100,h:r.h||30,
    original:r.original||'',translated:r.translated||'',
    fontSize:r.fontSize||gSize,color:r.color||gColor,
    bold:gFx.bold,italic:gFx.italic,underline:gFx.underline,
    stroke:gFx.stroke,strokeColor:document.getElementById('gStrokeColor').value,strokeW:parseInt(document.getElementById('gStrokeW').value),
    shadow:gFx.shadow,shadowColor:document.getElementById('gShadowColor').value,shadowBlur:parseInt(document.getElementById('gShadowB').value),
    align:r.align||gAlign,font:gFontVal
  }));
}

// ===== 렌더링 =====
async function renderAll(){
  if(!origImg||!regions.length)return;
  const off=document.createElement('canvas');
  off.width=imgW;off.height=imgH;
  const ctx=off.getContext('2d');
  ctx.drawImage(origImg,0,0);
  const bgMethod=document.getElementById('gBg').value;
  for(const r of regions){inpaint(ctx,r,bgMethod);drawText(ctx,r);}
  // 워터마크
  if(wmImg){
    const ratio=wmW/wmImg.naturalWidth;
    const wh=Math.round(wmImg.naturalHeight*ratio);
    ctx.globalAlpha=wmOpacity;
    ctx.drawImage(wmImg,wmX,wmY,wmW,wh);
    ctx.globalAlpha=1;
  }
  resultCanvas=off;
  redrawMain();renderList();renderOverlay();
}

function redrawMain(){
  if(!resultCanvas)return;
  const cvs=document.getElementById('mainCanvas');
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.drawImage(resultCanvas,0,0,cvs.width,cvs.height);
}

function inpaint(ctx,r,method){
  const pad=3,rx=Math.max(0,r.x-pad),ry=Math.max(0,r.y-pad);
  const rw=Math.min(imgW-rx,r.w+pad*2),rh=Math.min(imgH-ry,r.h+pad*2);
  if(method==='white'){ctx.fillStyle='#fff';ctx.fillRect(rx,ry,rw,rh);return;}
  if(method==='blur'){const id=ctx.getImageData(rx,ry,rw,rh);ctx.putImageData(boxBlur(id,14),rx,ry);return;}
  // auto: 4방향 주변색 평균
  const s=12,samples=[];
  [[rx,Math.max(0,ry-s),rw,s],[rx,Math.min(imgH-1,ry+rh),rw,Math.min(s,imgH-ry-rh)],
   [Math.max(0,rx-s),ry,Math.min(s,rx),rh],[Math.min(imgW-1,rx+rw),ry,Math.min(s,imgW-rx-rw),rh]].forEach(([ax,ay,aw,ah])=>{
    if(aw>0&&ah>0){const d=ctx.getImageData(ax,ay,aw,ah);for(let i=0;i<d.data.length;i+=4)samples.push([d.data[i],d.data[i+1],d.data[i+2]]);}
  });
  if(!samples.length){ctx.fillStyle='#fff';ctx.fillRect(rx,ry,rw,rh);return;}
  const avg=samples.reduce((a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],[0,0,0]).map(v=>Math.round(v/samples.length));
  ctx.fillStyle=`rgb(${avg.join(',')})`;ctx.fillRect(rx,ry,rw,rh);
}

function drawText(ctx,r){
  if(!r.translated)return;
  const ff=r.font||"'Noto Sans KR',sans-serif";
  let fw='';
  if(r.bold)fw='bold ';
  if(r.italic)fw=(fw||'')+' italic';
  // italic needs to come before bold in canvas font string
  const fontStr=r.italic?(r.bold?`bold italic ${r.fontSize}px ${ff}`:`italic ${r.fontSize}px ${ff}`):(r.bold?`bold ${r.fontSize}px ${ff}`:`${r.fontSize}px ${ff}`);
  ctx.save();
  ctx.beginPath();ctx.rect(r.x,r.y,r.w,r.h);ctx.clip();
  ctx.font=fontStr;
  const lines=wrapText(ctx,r.translated,r.w-6);
  const lh=r.fontSize*1.3,totalH=lines.length*lh,startY=r.y+(r.h-totalH)/2;
  ctx.textBaseline='top';ctx.textAlign=r.align||'center';
  const tx=r.align==='left'?r.x+4:r.align==='right'?r.x+r.w-4:r.x+r.w/2;
  // 그림자
  if(r.shadow){ctx.shadowColor=r.shadowColor||'#000';ctx.shadowBlur=r.shadowBlur||4;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;}
  // 획
  if(r.stroke){
    ctx.strokeStyle=r.strokeColor||'#fff';ctx.lineWidth=r.strokeW||2;ctx.lineJoin='round';
    lines.forEach((line,i)=>ctx.strokeText(line,tx,startY+i*lh));
  }
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  ctx.fillStyle=r.color;
  lines.forEach((line,i)=>{
    ctx.fillText(line,tx,startY+i*lh);
    // 밑줄
    if(r.underline){
      const w=ctx.measureText(line).width;
      const ux=r.align==='center'?tx-w/2:r.align==='right'?tx-w:tx;
      const uy=startY+i*lh+r.fontSize+1;
      ctx.fillRect(ux,uy,w,1.5);
    }
  });
  ctx.restore();
}

function wrapText(ctx,text,maxW){
  const lines=[];let cur='';
  for(const ch of text){const t=cur+ch;if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=ch;}else cur=t;}
  if(cur)lines.push(cur);return lines;
}

function boxBlur(id,r){
  const d=new ImageData(new Uint8ClampedArray(id.data),id.width,id.height);
  for(let y=0;y<id.height;y++)for(let x=0;x<id.width;x++){
    let R=0,G=0,B=0,c=0;
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const nx=Math.min(Math.max(x+dx,0),id.width-1),ny=Math.min(Math.max(y+dy,0),id.height-1);
      const i=(ny*id.width+nx)*4;R+=id.data[i];G+=id.data[i+1];B+=id.data[i+2];c++;
    }
    const i=(y*id.width+x)*4;d.data[i]=R/c;d.data[i+1]=G/c;d.data[i+2]=B/c;d.data[i+3]=255;
  }
  return d;
}

// 패치 기반 자연스러운 복구 (텍스처 샘플링)
function patchInpaint(ctx,rx,ry,rw,rh){
  // 주변 여러 방향에서 패치를 가져와 블렌딩
  const patchSize=Math.max(rw,rh);
  const offsets=[[-patchSize-5,0],[patchSize+5,0],[0,-patchSize-5],[0,patchSize+5],[-patchSize-5,-patchSize-5],[patchSize+5,patchSize+5]];
  const validPatches=[];
  for(const [dx,dy] of offsets){
    const px=rx+dx,py=ry+dy;
    if(px>=0&&py>=0&&px+rw<=imgW&&py+rh<=imgH){
      validPatches.push(ctx.getImageData(px,py,rw,rh));
    }
  }
  if(!validPatches.length){
    // fallback: 주변색
    const s=16,samples=[];
    [[rx,Math.max(0,ry-s),rw,s],[rx,Math.min(imgH-1,ry+rh),rw,s],[Math.max(0,rx-s),ry,s,rh],[Math.min(imgW-1,rx+rw),ry,s,rh]].forEach(([ax,ay,aw,ah])=>{
      if(aw>0&&ah>0){const d=ctx.getImageData(ax,ay,aw,ah);for(let i=0;i<d.data.length;i+=4)samples.push([d.data[i],d.data[i+1],d.data[i+2]]);}
    });
    if(samples.length){const avg=samples.reduce((a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],[0,0,0]).map(v=>Math.round(v/samples.length));ctx.fillStyle=`rgb(${avg.join(',')})`;ctx.fillRect(rx,ry,rw,rh);}
    return;
  }
  // 패치들 블렌딩
  const result=new Uint8ClampedArray(rw*rh*4);
  for(let i=0;i<result.length;i+=4){
    let R=0,G=0,B=0;
    for(const p of validPatches){R+=p.data[i];G+=p.data[i+1];B+=p.data[i+2];}
    result[i]=R/validPatches.length;result[i+1]=G/validPatches.length;result[i+2]=B/validPatches.length;result[i+3]=255;
  }
  // 가우시안 블러로 경계 부드럽게
  const blurred=boxBlur(new ImageData(result,rw,rh),3);
  ctx.putImageData(blurred,rx,ry);
}

// ===== 오버레이 (텍스트박스 + 리사이즈 핸들) =====
function renderOverlay(){
  const ov=document.getElementById('overlay');ov.innerHTML='';
  if(eraseMode||eyedropMode)return;
  ov.style.pointerEvents='';
  // 워터마크 박스
  if(wmImg&&resultCanvas){
    const ratio=wmW/wmImg.naturalWidth;
    const wh=Math.round(wmImg.naturalHeight*ratio);
    const wb=document.createElement('div');
    wb.className='wmbox';
    wb.style.cssText=`left:${wmX*scale}px;top:${wmY*scale}px;width:${wmW*scale}px;height:${wh*scale}px`;
    // 드래그 이동
    wb.onmousedown=e=>{
      if(e.target.classList.contains('wmhandle'))return;
      e.preventDefault();e.stopPropagation();
      const sx=e.clientX,sy=e.clientY,ox=wmX,oy=wmY;
      const onMove=me=>{wmX=Math.round(Math.max(0,ox+(me.clientX-sx)/scale));wmY=Math.round(Math.max(0,oy+(me.clientY-sy)/scale));wb.style.left=wmX*scale+'px';wb.style.top=wmY*scale+'px';document.getElementById('wmX').value=wmX;document.getElementById('wmY').value=wmY;};
      const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);renderAll();};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    };
    const wh2=document.createElement('div');wh2.className='wmhandle';
    wh2.onmousedown=e=>{
      e.preventDefault();e.stopPropagation();
      const sx=e.clientX,ow=wmW;
      const onMove=me=>{wmW=Math.max(20,Math.round(ow+(me.clientX-sx)/scale));document.getElementById('wmW').value=wmW;updateWmBox();};
      const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);renderAll();};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    };
    wb.appendChild(wh2);ov.appendChild(wb);
  }
  regions.forEach(r=>{
    const box=document.createElement('div');
    box.className='rbox'+(selId===r.id?' sel':'');
    box.style.cssText=`left:${r.x*scale}px;top:${r.y*scale}px;width:${r.w*scale}px;height:${r.h*scale}px;cursor:move`;
    const lbl=document.createElement('div');lbl.className='rlabel';lbl.textContent=`#${r.id+1}`;
    box.appendChild(lbl);
    box.onclick=e=>{e.stopPropagation();selId=r.id;renderList();renderOverlay();scrollToCard(r.id);};
    // 드래그 이동
    box.onmousedown=e=>{
      if(e.target.classList.contains('rhandle'))return;
      e.preventDefault();e.stopPropagation();
      const sx=e.clientX,sy=e.clientY,ox=r.x,oy=r.y;
      const onMove=me=>{r.x=Math.round(Math.max(0,ox+(me.clientX-sx)/scale));r.y=Math.round(Math.max(0,oy+(me.clientY-sy)/scale));box.style.left=r.x*scale+'px';box.style.top=r.y*scale+'px';updateCardPos(r);};
      const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);renderAll();};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    };
    // 리사이즈 핸들 8방향
    if(selId===r.id){
      const handles=[
        {cls:'nw',onDrag:(dx,dy,e)=>{const nw=Math.max(20,r.w-dx),nh=Math.max(10,r.h-dy);const nx=r.x+r.w-nw,ny=r.y+r.h-nh;if(e.shiftKey){const s=Math.min(nw/r.w,nh/r.h);r.w=Math.round(r.w*s);r.h=Math.round(r.h*s);r.x=Math.round(r.x+r.w*(1-s));r.y=Math.round(r.y+r.h*(1-s));}else{r.w=nw;r.h=nh;r.x=nx;r.y=ny;}}},
        {cls:'ne',onDrag:(dx,dy,e)=>{const nw=Math.max(20,r.w+dx),nh=Math.max(10,r.h-dy);const ny=r.y+r.h-nh;if(e.shiftKey){const s=Math.min(nw/r.w,nh/r.h);r.w=Math.round(r.w*s);r.h=Math.round(r.h*s);r.y=Math.round(r.y+r.h*(1-s));}else{r.w=nw;r.h=nh;r.y=ny;}}},
        {cls:'sw',onDrag:(dx,dy,e)=>{const nw=Math.max(20,r.w-dx),nh=Math.max(10,r.h+dy);const nx=r.x+r.w-nw;if(e.shiftKey){const s=Math.min(nw/r.w,nh/r.h);r.w=Math.round(r.w*s);r.h=Math.round(r.h*s);r.x=Math.round(r.x+r.w*(1-s));}else{r.w=nw;r.h=nh;r.x=nx;}}},
        {cls:'se',onDrag:(dx,dy,e)=>{const nw=Math.max(20,r.w+dx),nh=Math.max(10,r.h+dy);if(e.shiftKey){const s=Math.max(nw/r.w,nh/r.h);r.w=Math.round(r.w*s);r.h=Math.round(r.h*s);}else{r.w=nw;r.h=nh;}}},
        {cls:'n',onDrag:(dx,dy)=>{const nh=Math.max(10,r.h-dy);r.y=r.y+r.h-nh;r.h=nh;}},
        {cls:'s',onDrag:(dx,dy)=>{r.h=Math.max(10,r.h+dy);}},
        {cls:'e',onDrag:(dx)=>{r.w=Math.max(20,r.w+dx);}},
        {cls:'w',onDrag:(dx)=>{const nw=Math.max(20,r.w-dx);r.x=r.x+r.w-nw;r.w=nw;}},
      ];
      handles.forEach(h=>{
        const el=document.createElement('div');el.className=`rhandle ${h.cls}`;
        let startX,startY,startR;
        el.onmousedown=e=>{
          e.preventDefault();e.stopPropagation();
          startX=e.clientX;startY=e.clientY;
          startR={x:r.x,y:r.y,w:r.w,h:r.h};
          const onMove=me=>{
            const dx=(me.clientX-startX)/scale,dy=(me.clientY-startY)/scale;
            r.x=startR.x;r.y=startR.y;r.w=startR.w;r.h=startR.h;
            h.onDrag(dx,dy,me);
            box.style.left=r.x*scale+'px';box.style.top=r.y*scale+'px';
            box.style.width=r.w*scale+'px';box.style.height=r.h*scale+'px';
            updateCardPos(r);updateCardSize(r);
          };
          const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);renderAll();};
          document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
        };
        box.appendChild(el);
      });
    }
    ov.appendChild(box);
  });
}

function updateCardPos(r){
  const ex=document.getElementById(`rx-${r.id}`),ey=document.getElementById(`ry-${r.id}`);
  if(ex)ex.value=r.x;if(ey)ey.value=r.y;
}
function updateCardSize(r){
  const ew=document.getElementById(`rw-${r.id}`),eh=document.getElementById(`rh-${r.id}`);
  if(ew)ew.value=r.w;if(eh)eh.value=r.h;
}

// ===== 지우개 =====
function toggleEraseMode(){
  eraseMode=!eraseMode;
  const btn=document.getElementById('eraseBtn'),card=document.getElementById('eraseCard'),cvs=document.getElementById('mainCanvas');
  if(eraseMode){
    btn.classList.add('active');btn.textContent='🧹 지우개 ON';
    card.classList.add('show');cvs.classList.add('erase-cursor');
    switchTab('settings');toast('캔버스 드래그로 지우세요','ok');
    document.getElementById('overlay').style.pointerEvents='none';
  }else{
    btn.classList.remove('active');btn.textContent='🧹 지우개';
    card.classList.remove('show');cvs.classList.remove('erase-cursor');
    document.getElementById('eraseCursor').style.display='none';
    document.getElementById('overlay').style.pointerEvents='';
  }
}

function setupEraseEvents(cvs){
  cvs.addEventListener('mousedown',e=>{if(!eraseMode)return;erasing=true;eraseAt(e);});
  cvs.addEventListener('mousemove',e=>{
    if(!eraseMode)return;
    const rect=cvs.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    const sz=parseInt(document.getElementById('eraseSize').value)*scale;
    const cur=document.getElementById('eraseCursor');
    cur.style.display='block';cur.style.left=x+'px';cur.style.top=y+'px';cur.style.width=(sz*2)+'px';cur.style.height=(sz*2)+'px';
    if(erasing)eraseAt(e);
  });
  cvs.addEventListener('mouseup',()=>{erasing=false;});
  cvs.addEventListener('mouseleave',()=>{erasing=false;document.getElementById('eraseCursor').style.display='none';});
}

function eraseAt(e){
  if(!resultCanvas)return;
  const cvs=document.getElementById('mainCanvas');
  const rect=cvs.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/scale,my=(e.clientY-rect.top)/scale;
  const size=parseInt(document.getElementById('eraseSize').value);
  const method=document.getElementById('eraseFill').value;
  const ctx=resultCanvas.getContext('2d');
  const rx=Math.max(0,Math.round(mx-size)),ry=Math.max(0,Math.round(my-size));
  const rw=Math.min(imgW-rx,size*2),rh=Math.min(imgH-ry,size*2);
  if(rw<=0||rh<=0)return;
  if(method==='white'){ctx.fillStyle='#fff';ctx.fillRect(rx,ry,rw,rh);}
  else if(method==='blur'){const id=ctx.getImageData(rx,ry,rw,rh);ctx.putImageData(boxBlur(id,10),rx,ry);}
  else if(method==='patch'){patchInpaint(ctx,rx,ry,rw,rh);}
  else if(method==='eyedrop'){ctx.fillStyle=eyedropColor;ctx.fillRect(rx,ry,rw,rh);}
  else{
    // auto
    const s=8,samples=[];
    [[rx,Math.max(0,ry-s),rw,s],[rx,Math.min(imgH-1,ry+rh),rw,s],[Math.max(0,rx-s),ry,s,rh],[Math.min(imgW-1,rx+rw),ry,s,rh]].forEach(([ax,ay,aw,ah])=>{
      if(aw>0&&ah>0){const d=ctx.getImageData(ax,ay,aw,ah);for(let i=0;i<d.data.length;i+=4)samples.push([d.data[i],d.data[i+1],d.data[i+2]]);}
    });
    if(!samples.length){ctx.fillStyle='#fff';ctx.fillRect(rx,ry,rw,rh);}
    else{const avg=samples.reduce((a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],[0,0,0]).map(v=>Math.round(v/samples.length));ctx.fillStyle=`rgb(${avg.join(',')})`;ctx.fillRect(rx,ry,rw,rh);}
  }
  redrawMain();
}

// ===== 스포이드 =====
function toggleEyedrop(){
  eyedropMode=!eyedropMode;
  const btn=document.getElementById('eyedropBtn'),cvs=document.getElementById('mainCanvas');
  btn.classList.toggle('active',eyedropMode);
  btn.textContent=eyedropMode?'💧 스포이드 ON':'💧 스포이드';
  cvs.classList.toggle('eyedrop-cursor',eyedropMode);
  if(!eyedropMode){document.getElementById('eyedropPreview').style.display='none';}
}

function setupEyedropEvents(cvs){
  cvs.addEventListener('mousemove',e=>{
    if(!eyedropMode||!resultCanvas)return;
    const rect=cvs.getBoundingClientRect();
    const mx=Math.round((e.clientX-rect.left)/scale),my=Math.round((e.clientY-rect.top)/scale);
    const px=resultCanvas.getContext('2d').getImageData(Math.min(mx,imgW-1),Math.min(my,imgH-1),1,1).data;
    eyedropColor=`rgb(${px[0]},${px[1]},${px[2]})`;
    const prev=document.getElementById('eyedropPreview');
    prev.style.display='block';prev.style.background=eyedropColor;prev.style.left=e.clientX+'px';prev.style.top=e.clientY+'px';
  });
  cvs.addEventListener('click',e=>{
    if(!eyedropMode)return;
    toast(`색상 선택됨: ${eyedropColor}`,'ok');
    toggleEyedrop();
  });
}

function toggleOrigPanel(){

}

// ===== 워터마크 =====
function loadWatermark(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      wmImg=img;wmX=parseInt(document.getElementById('wmX').value);wmY=parseInt(document.getElementById('wmY').value);wmW=parseInt(document.getElementById('wmW').value);wmOpacity=parseInt(document.getElementById('wmOpacity').value)/100;
      document.getElementById('wmPreviewWrap').style.display='';
      document.getElementById('wmPreviewImg').src=ev.target.result;
      renderAll();toast('워터마크 업로드됨','ok');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function updateWmBox(){
  wmX=parseInt(document.getElementById('wmX').value)||0;
  wmY=parseInt(document.getElementById('wmY').value)||0;
  wmW=parseInt(document.getElementById('wmW').value)||200;
  wmOpacity=parseInt(document.getElementById('wmOpacity').value)/100;
  renderOverlay();
}

function removeWatermark(){wmImg=null;renderAll();toast('워터마크 제거됨','ok');}

// ===== 영역 리스트 =====
function renderList(){
  const list=document.getElementById('rlist');
  if(!regions.length){list.innerHTML='<div class="empty"><div class="ei">📋</div><p>이미지를 업로드하고<br>번역 시작을 눌러주세요</p></div>';return;}
  list.innerHTML=regions.map(r=>`
    <div class="rcard ${selId===r.id?'sel':''}" id="rcard-${r.id}" onclick="selRegion(${r.id})">
      <div class="rcard-head"><div class="rnum">${r.id+1}</div><div class="rprev">${esc(r.translated||r.original||'')}</div></div>
      <div class="rcard-body">
        <div class="fl"><label>원본 (중국어)</label><input class="fi" readonly value="${esc(r.original)}" style="opacity:.5;font-size:11px"></div>
        <div class="fl"><label>번역 텍스트</label><textarea class="fi" oninput="upd(${r.id},'translated',this.value)">${esc(r.translated)}</textarea></div>
        <div class="drag-hint">📦 이미지 위 박스 드래그=이동 / 모서리 핸들=리사이즈 (Shift=비율유지)</div>
        <div class="row2">
          <div class="fl"><label>X</label><input type="number" class="fi" id="rx-${r.id}" value="${r.x}" oninput="updN(${r.id},'x',this.value)"></div>
          <div class="fl"><label>Y</label><input type="number" class="fi" id="ry-${r.id}" value="${r.y}" oninput="updN(${r.id},'y',this.value)"></div>
          <div class="fl"><label>W</label><input type="number" class="fi" id="rw-${r.id}" value="${r.w}" oninput="updN(${r.id},'w',this.value)"></div>
          <div class="fl"><label>H</label><input type="number" class="fi" id="rh-${r.id}" value="${r.h}" oninput="updN(${r.id},'h',this.value)"></div>
        </div>
        <div class="row2">
          <div class="fl"><label>폰트 크기</label><input type="number" class="fi" value="${r.fontSize}" oninput="updN(${r.id},'fontSize',this.value)"></div>
          <div class="fl" style="align-items:flex-start"><label>색상</label><input type="color" value="${r.color}" onchange="upd(${r.id},'color',this.value)"></div>
          <div class="fl" style="flex:1"><label>정렬</label>
            <select class="fi" onchange="upd(${r.id},'align',this.value)">
              <option value="center" ${r.align==='center'?'selected':''}>가운데</option>
              <option value="left" ${r.align==='left'?'selected':''}>왼쪽</option>
              <option value="right" ${r.align==='right'?'selected':''}>오른쪽</option>
            </select>
          </div>
        </div>
        <div class="fl"><label>폰트</label>${buildRegionFontSel(r)}</div>
        <div class="fl"><label>텍스트 효과</label>
          <div class="fx-row">
            <button class="fx-btn${r.bold?' on':''}" onclick="event.stopPropagation();updToggle(${r.id},'bold');this.classList.toggle('on')"><b>B</b></button>
            <button class="fx-btn${r.italic?' on':''}" onclick="event.stopPropagation();updToggle(${r.id},'italic');this.classList.toggle('on')"><i>I</i></button>
            <button class="fx-btn${r.underline?' on':''}" onclick="event.stopPropagation();updToggle(${r.id},'underline');this.classList.toggle('on')"><u>U</u></button>
            <button class="fx-btn${r.stroke?' on':''}" onclick="event.stopPropagation();updToggle(${r.id},'stroke');this.classList.toggle('on')">획</button>
            <button class="fx-btn${r.shadow?' on':''}" onclick="event.stopPropagation();updToggle(${r.id},'shadow');this.classList.toggle('on')">그림자</button>
          </div>
        </div>
        ${r.stroke?`<div class="row2"><div class="fl"><label>획 색상</label><input type="color" value="${r.strokeColor||'#ffffff'}" onchange="upd(${r.id},'strokeColor',this.value)"></div><div class="fl" style="flex:1"><label>획 두께</label><input type="number" class="fi" value="${r.strokeW||2}" min="1" max="15" oninput="updN(${r.id},'strokeW',this.value)"></div></div>`:''}
        ${r.shadow?`<div class="row2"><div class="fl"><label>그림자 색</label><input type="color" value="${r.shadowColor||'#000000'}" onchange="upd(${r.id},'shadowColor',this.value)"></div><div class="fl" style="flex:1"><label>블러</label><input type="number" class="fi" value="${r.shadowBlur||4}" min="1" max="20" oninput="updN(${r.id},'shadowBlur',this.value)"></div></div>`:''}
        <button class="apply-btn" onclick="event.stopPropagation();applyOne(${r.id})">✓ 이 영역 적용</button>
      </div>
    </div>
  `).join('');
}

function selRegion(id){selId=id;renderList();renderOverlay();}
function scrollToCard(id){const el=document.getElementById(`rcard-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});}
function upd(id,key,val){const r=regions.find(r=>r.id===id);if(r)r[key]=val;}
function updN(id,key,val){const r=regions.find(r=>r.id===id);if(r)r[key]=Number(val);}
function updToggle(id,key){const r=regions.find(r=>r.id===id);if(r)r[key]=!r[key];}
async function applyOne(id){await renderAll();toast('적용 완료!','ok');}

function applyGlobal(){
  const size=parseInt(document.getElementById('gSizeN').value),color=document.getElementById('gColor').value,align=document.getElementById('gAlign').value;
  regions.forEach(r=>{r.font=gFontVal;r.fontSize=size;r.color=color;r.align=align;r.bold=gFx.bold;r.italic=gFx.italic;r.underline=gFx.underline;r.stroke=gFx.stroke;r.strokeColor=document.getElementById('gStrokeColor').value;r.strokeW=parseInt(document.getElementById('gStrokeW').value);r.shadow=gFx.shadow;r.shadowColor=document.getElementById('gShadowColor').value;r.shadowBlur=parseInt(document.getElementById('gShadowB').value);});
  renderAll();renderList();toast('전체 적용 완료!','ok');
}

function doExport(){
  if(!resultCanvas){toast('먼저 번역을 실행하세요','ng');return;}
  const a=document.createElement('a');a.download=`translated_${Date.now()}.png`;a.href=resultCanvas.toDataURL('image/png');a.click();
  toast(`내보내기 완료! (${resultCanvas.width}×${resultCanvas.height}px)`,'ok');
}

function toB64(img,w,h){
  return new Promise(res=>{
    const c=document.createElement('canvas'),maxPx=1500;
    let sw=w,sh=h;if(sw>maxPx||sh>maxPx){const r=Math.min(maxPx/sw,maxPx/sh);sw=Math.round(sw*r);sh=Math.round(sh*r);}
    c.width=sw;c.height=sh;c.getContext('2d').drawImage(img,0,0,sw,sh);
    res(c.toDataURL('image/jpeg',.80).split(',')[1]);
  });
}

function switchTab(tab){
  ['regions','settings','watermark'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display=t===tab?'':'none';
    document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle('on',t===tab);
  });
}

function toggleOrigPanel(){document.getElementById('origPanel').classList.toggle('show');}
function setLoading(show,txt=''){const el=document.getElementById('loading');el.classList.toggle('show',show);if(txt)document.getElementById('ltxt').textContent=txt;}
function setPill(txt,cls){const p=document.getElementById('pill');p.textContent=txt;p.className='pill'+(cls?' '+cls:'');}
function toast(msg,cls=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(cls?' '+cls:'');void t.offsetWidth;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
